name: Build plugin

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tool
        run: python -m pip install --upgrade pip build

      - name: Build wheel
        run: python -m build

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: endstone-bundle-anti-dupe
          path: dist/*.whl

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tool
        run: python -m pip install --upgrade pip build

      - name: Build wheel
        run: python -m build

      - name: Create GitHub Release with wheel attached
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
