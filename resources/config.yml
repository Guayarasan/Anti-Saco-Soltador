language: en_US
debug: false
storage_backend: sqlite
max_logs: 500
cache_ttl_seconds: 30
rate_limit_per_minute: 120
metrics_enabled: true
disabled_worlds: []
actions:
  on_low:
  - log
  on_medium:
  - log
  - alert
  on_high:
  - log
  - alert
  - remove_item
  on_critical:
  - log
  - alert
  - remove_item
  - notify_severe
detectors:
  bundle_container:
    enabled: true
    cooldown_seconds: 1.0
    thresholds:
      medium: 40
      high: 70
      critical: 90
    options:
      watched_containers:
      - hopper
      - dropper
      - chest
      - barrel
      batch_size: 40
      batch_interval_ticks: 5
      fallback_scan_interval_ticks: 400
  bundle_ground:
    enabled: true
    cooldown_seconds: 5.0
    thresholds:
      medium: 30
      high: 60
      critical: 85
    options:
      scan_interval_ticks: 15
      scan_radius: 16
